name: Build and Push Linyaps Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "新版本号 (如 2.2.1.0)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
      options: --privileged

    env:
      LINGLONG_USERNAME: ${{ secrets.LINGLONG_USERNAME }}
      LINGLONG_PASSWORD: ${{ secrets.LINGLONG_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Update sources from GitHub Release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: python3 ./update-from-github-release.py

      - name: Update version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: python3 ./update-version.py ${{ inputs.version }}

      - name: Install ll-builder
        shell: bash
        run: |
          pacman -Syu --noconfirm linyaps wget fuse-overlayfs fuse2fs

      - name: Cache linglong-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/linglong-builder
          key: ${{ runner.os }}-linglong-builder-repo-objects

      - name: Build amd64
        shell: bash
        run: |
          ll-builder --version
          ll-builder repo add --alias=testing stable https://cdn-linglong.odata.cc
          ll-builder repo set-default testing
          export LINYAPS_LOG_LEVEL=debug
          ll-builder build --skip-output-check 2>&1 | tee build-amd64.log

      - name: Build arm64
        shell: bash
        run: |
          ll-builder build -f arm64/linglong.yaml --skip-output-check

      - name: Push amd64
        shell: bash
        run: |
          ll-builder push --repo-url https://cdn-linglong.odata.cc --repo-name stable --module binary

      - name: Push arm64
        shell: bash
        run: |
          ll-builder push --repo-url https://cdn-linglong.odata.cc --repo-name stable --module binary -f arm64/linglong.yaml
      
      - name: Commit and push version update
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add linglong.yaml arm64/linglong.yaml resources/usr/bin/setup-linyaps-dbus.sh
          git commit -m "fix: update package version to ${{ inputs.version }}"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: layers
          path: ./*.layer

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: build-*.log
