version: "1"

package:
  id: com.dongpl.linglong-store.v2
  name: linglong-store
  version: 3.3.6.1
  kind: app
  # channel: beta
  architecture: arm64
  description: |
    用于发现和管理玲珑应用的玲珑商店社区版。

command:
  - /opt/apps/com.dongpl.linglong-store.v2/files/bin/setup-linyaps-dbus.sh

base: org.deepin.base/25.2.2
# runtime: org.deepin.runtime.gtk4/25.2.2

build: |
  DEB_ROOT=/tmp/linglong-store-deb

  rm -rf "$DEB_ROOT"
  mkdir -p "$DEB_ROOT"
  cp /project/linglong/sources/linglong-store "$DEB_ROOT/linglong-store.deb"

  cd "$DEB_ROOT"
  ar x linglong-store.deb
  tar -xf data.tar.xz

  mkdir -p "${PREFIX}/opt"
  cp -a "$DEB_ROOT/opt/linglong-store" "${PREFIX}/opt/"

  mkdir -p "${PREFIX}/usr/bin"
  cat > "${PREFIX}/usr/bin/linglong-store" <<'EOF'
  #!/usr/bin/env bash
  set -euo pipefail
  SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
  APPDIR_ROOT="$(cd "$SCRIPT_DIR/../.." && pwd)"
  exec "$APPDIR_ROOT/opt/linglong-store/linglong_store" "$@"
  EOF
  chmod 755 "${PREFIX}/usr/bin/linglong-store"

  install -Dm755 /project/linglong/sources/linyaps-dbus-server ${PREFIX}/bin/linyaps-dbus-server
  install -Dm755 /project/linglong/sources/linyapsctl ${PREFIX}/bin/ll-cli
  install -Dm755 /project/linglong/sources/linyapsctl ${PREFIX}/bin/pkexec
  cp -a /project/resources/usr/* ${PREFIX}

sources:
  - kind: file
    url: https://github.com/HanHan666666/flutter-linglong-store/releases/download/v3.3.6/linglong-store_3.3.6_arm64.deb
    digest: 0e363c788bd324c30b1bb60befe67b8e360c27d6a33445c155f960b02448b862
    name: linglong-store

  - kind: file
    url: https://github.com/guanzi008/org.linglong-store.LinyapsManager/releases/download/v0.0.9/linyaps-dbus-server-linux-arm64
    digest: 4bc3743dfb9fe3b174b208ec577d3dc1397a66defecb23a8c11a348b0a8d2424
    name: linyaps-dbus-server

  - kind: file
    url: https://github.com/guanzi008/org.linglong-store.LinyapsManager/releases/download/v0.0.9/linyapsctl-linux-arm64
    digest: c3182c84e13fbda3dffc6a920d540b9aea500ec858c2a3e1fb2e0d3b856473fc
    name: linyapsctl
