version: "1"

package:
  id: com.dongpl.linglong-store.v2
  name: linglong-store
  version: 3.3.6.2
  kind: app
  # channel: beta
  architecture: x86_64
  description: |
    用于发现和管理玲珑应用的玲珑商店社区版。

command:
  - /opt/apps/com.dongpl.linglong-store.v2/files/bin/setup-linyaps-dbus.sh

base: org.deepin.base/25.2.2
# runtime: org.deepin.runtime.gtk4/25.2.2

build: |
  DEB_ROOT=/tmp/linglong-store-deb

  rm -rf "$DEB_ROOT"
  mkdir -p "$DEB_ROOT"
  cp /project/linglong/sources/linglong-store "$DEB_ROOT/linglong-store.deb"

  cd "$DEB_ROOT"
  ar x linglong-store.deb
  tar -xf data.tar.xz

  mkdir -p "${PREFIX}/opt"
  cp -a "$DEB_ROOT/opt/linglong-store" "${PREFIX}/opt/"

  mkdir -p "${PREFIX}/usr/bin"
  cat > "${PREFIX}/usr/bin/linglong-store" <<'EOF'
  #!/usr/bin/env bash
  set -euo pipefail
  SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
  APPDIR_ROOT="$(cd "$SCRIPT_DIR/../.." && pwd)"
  exec "$APPDIR_ROOT/opt/linglong-store/linglong_store" "$@"
  EOF
  chmod 755 "${PREFIX}/usr/bin/linglong-store"

  install -Dm755 /project/linglong/sources/linyaps-dbus-server ${PREFIX}/bin/linyaps-dbus-server
  install -Dm755 /project/linglong/sources/linyapsctl ${PREFIX}/bin/ll-cli
  install -Dm755 /project/linglong/sources/linyapsctl ${PREFIX}/bin/pkexec
  cp -a /project/resources/usr/* ${PREFIX}

sources:
  - kind: file
    url: https://github.com/HanHan666666/flutter-linglong-store/releases/download/v3.3.6/linglong-store_3.3.6_amd64.deb
    digest: f03d42c00a6bcc85a4a38d6f525fd1d536faaeabc264f8ca1f3a9c1282af468b
    name: linglong-store

  - kind: file
    url: https://github.com/guanzi008/org.linglong-store.LinyapsManager/releases/download/v0.0.9/linyaps-dbus-server-linux-amd64
    digest: fa99950ce4040bd6f0cf2d3025cac2880699f43ad69e43e67618f951162bb349
    name: linyaps-dbus-server

  - kind: file
    url: https://github.com/guanzi008/org.linglong-store.LinyapsManager/releases/download/v0.0.9/linyapsctl-linux-amd64
    digest: 5d560e1cd3dc7639a08100b3b9ae0f510e774ae5486837fb509e238246d47ea1
    name: linyapsctl
